workflows:
  android-workflow:
    name: Vela Portugal Android Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      java: 17
      ndk: 26.1.10909125
      vars:
        GRADLE_OPTS: "-Xmx2048m -XX:MaxPermSize=512m"
    triggering:
      events:
        - push
        - tag
        - pull_request
    scripts:
      - name: Install Node dependencies
        script: |
          cd $CM_BUILD_DIR
          pnpm install
      - name: Build web assets
        script: |
          cd $CM_BUILD_DIR
          pnpm build
      - name: Copy web assets to dist root
        script: |
          cd $CM_BUILD_DIR
          cp dist/public/index.html dist/ || true
          cp -r dist/public/assets dist/ || true
          cp -r dist/public/__manus__ dist/ || true
      - name: Update Capacitor
        script: |
          cd $CM_BUILD_DIR
          npx cap sync android
      - name: Clean Gradle cache
        script: |
          cd $CM_BUILD_DIR/android
          ./gradlew clean
      - name: Build Android APK (Debug)
        script: |
          cd $CM_BUILD_DIR/android
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - rafa.m.gab.familylink@gmail.com
        notify:
          success: true
          failure: true
